name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --profile minimal --component rustfmt
      - name: Check code format
        run: cargo +nightly fmt --all -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Clippy sim
        run: cargo clippy -- -D warnings
        env:
          RUSTFLAGS: "--cfg msim"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build std
        run: cargo build
      - name: Build sim
        run: cargo build
        env:
          RUSTFLAGS: "--cfg msim"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test std
        run: cargo test --release --no-fail-fast
      - name: Test sim
        # Skip doc tests (outdated API signatures) and known-broken TCP hangup tests.
        run: >-
          cargo test --release --no-fail-fast --lib --bins
          -- --skip tcp_test_client_hangup_read --skip tcp_test_server_hangup_read
        env:
          RUSTFLAGS: "--cfg msim"

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Doc
        run: cargo doc --no-deps
        env:
          RUSTFLAGS: "--cfg msim"
          RUSTDOCFLAGS: "--cfg msim"
